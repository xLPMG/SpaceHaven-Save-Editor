name: Tests

on:
  workflow_call:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-build.txt && pip install pytest pytest-qt

      - name: Run unit tests
        run: python -m pytest tests/ --ignore=tests/ui/ -v

      - name: Run UI tests
        run: python -m pytest tests/ui/ -v
