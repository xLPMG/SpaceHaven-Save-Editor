name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SpaceHaven-Save-Editor-windows
            dist_path: "dist/SpaceHaven Save Editor/"
            icon_path: "assets/app.ico"
          - os: macos-latest
            artifact: SpaceHaven-Save-Editor-macos
            dist_path: "dist"
            icon_path: "assets/app.icns"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements-build.txt pyinstaller

      - name: Install Pillow (Windows – ICO generation)
        if: runner.os == 'Windows'
        run: pip install Pillow

      - name: Generate app icon (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p assets app.iconset
          magick -background none src/ui/icons/app.svg -resize 1024x1024 /tmp/app_1024.png
          for entry in \
            "16   icon_16x16.png" \
            "32   icon_16x16@2x.png" \
            "32   icon_32x32.png" \
            "64   icon_32x32@2x.png" \
            "128  icon_128x128.png" \
            "256  icon_128x128@2x.png" \
            "256  icon_256x256.png" \
            "512  icon_256x256@2x.png" \
            "512  icon_512x512.png" \
            "1024 icon_512x512@2x.png"; do
            size=$(echo $entry | awk '{print $1}')
            name=$(echo $entry | awk '{print $2}')
            sips -z $size $size /tmp/app_1024.png --out "app.iconset/$name" >/dev/null
          done
          iconutil -c icns app.iconset -o assets/app.icns
          rm -rf app.iconset

      - name: Generate app icon (Windows)
        if: runner.os == 'Windows'
        run: python scripts/make_ico.py

      - name: Build
        run: >
          pyinstaller --windowed
          --name "SpaceHaven Save Editor"
          --icon=${{ matrix.icon_path }}
          --exclude-module PySide6.QtNetwork
          --exclude-module PySide6.QtPrintSupport
          --exclude-module PySide6.QtXml
          --exclude-module PySide6.QtOpenGL
          --exclude-module PySide6.QtOpenGLWidgets
          --exclude-module PySide6.QtSql
          --exclude-module PySide6.QtTest
          --exclude-module PySide6.QtConcurrent
          --exclude-module PySide6.QtHelp
          --exclude-module PySide6.QtSvgWidgets
          --exclude-module pygments
          main.py

      - name: Zip app bundle (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "SpaceHaven Save Editor.zip" "SpaceHaven Save Editor.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}${{ github.ref_type == 'tag' && format('-{0}', github.ref_name) || '' }}
          path: ${{ matrix.dist_path }}
