name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SpaceHaven-Save-Editor-windows
            dist_path: "dist/SpaceHaven Save Editor/"
            icon_path: "assets/app.ico"
          - os: macos-latest
            artifact: SpaceHaven-Save-Editor-macos
            dist_path: "dist/SpaceHaven Save Editor.app"
            icon_path: "assets/app.icns"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Pillow (Windows – ICO generation)
        if: runner.os == 'Windows'
        run: pip install Pillow

      - name: Generate app icons
        run: python scripts/make_icons.py
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build
        run: pyinstaller --windowed --name "SpaceHaven Save Editor" --icon=${{ matrix.icon_path }} main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.dist_path }}
