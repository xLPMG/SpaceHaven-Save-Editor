name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    uses: ./.github/workflows/tests.yml

  build:
    name: build–${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: SpaceHaven-Save-Editor-windows
            dist_path: "dist/SpaceHaven Save Editor/"
            icon_path: "assets/app.ico"
            data_sep: ";"
          - os: macos-latest
            artifact: SpaceHaven-Save-Editor-macos
            dist_path: "_stage"
            icon_path: "assets/app.icns"
            data_sep: ":"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements-build.txt pyinstaller

      - name: Generate app icon (macOS)
        if: runner.os == 'macOS'
        run: python scripts/make_icns.py

      - name: Generate app icon (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install Pillow
          python scripts/make_ico.py

      - name: Build
        run: >
          pyinstaller --windowed
          --name "SpaceHaven Save Editor"
          --icon=${{ matrix.icon_path }}
          --exclude-module PySide6.QtNetwork
          --exclude-module PySide6.QtPrintSupport
          --exclude-module PySide6.QtXml
          --exclude-module PySide6.QtOpenGL
          --exclude-module PySide6.QtOpenGLWidgets
          --exclude-module PySide6.QtSql
          --exclude-module PySide6.QtTest
          --exclude-module PySide6.QtConcurrent
          --exclude-module PySide6.QtHelp
          --exclude-module PySide6.QtSvgWidgets
          --exclude-module pygments
          --add-data "src/ui/icons${{ matrix.data_sep }}src/ui/icons"
          main.py

      - name: Stage macOS artifact
        if: runner.os == 'macOS'
        run: |
          # Remove the raw folder (bc .app contains everything)
          rm -rf "dist/SpaceHaven Save Editor"
          # Strip Qt translations to trim file size
          find "dist/SpaceHaven Save Editor.app" -name "qt_*.qm" -delete
          # Move the .app into a clean staging dir
          mkdir _stage
          mv "dist/SpaceHaven Save Editor.app" _stage/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}${{ github.ref_type == 'tag' && format('-{0}', github.ref_name) || '' }}
          path: ${{ matrix.dist_path }}
