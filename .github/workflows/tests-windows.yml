name: Tests (Windows)

on:
  workflow_call:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install base dependencies
        run: |
          pip install -r requirements-build.txt
          pip install pytest

      - name: Run unit tests (without Qt)
        run: python -m pytest tests/test_save_file.py -v

      - name: Install Qt testing dependencies
        run: pip install pytest-qt

      - name: Run UI tests
        run: python -m pytest tests/ui/ -v
