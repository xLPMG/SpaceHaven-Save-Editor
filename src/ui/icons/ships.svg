  <rect x="6" y="10" width="8" height="3.5" rx="1" fill="none" stroke="#3BBECE" stroke-width="1.5"/>
  <!-- Left thruster fin -->
  <path d="M6 13c-1.8 0-2.5 1.5-2.5 3h4.5" fill="none" stroke="#3BBECE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right thruster fin -->
  <path d="M14 13c1.8 0 2.5 1.5 2.5 3H12" fill="none" stroke="#3BBECE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
