<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Space background -->
  <circle cx="32" cy="32" r="32" fill="#040B0F"/>
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="#00D8F0" stroke-width="0.9" opacity="0.4"/>

  <!-- Stars -->
  <circle cx="10" cy="13" r="1"   fill="#DDF0F5" opacity="0.55"/>
  <circle cx="53" cy="10" r="0.7" fill="#DDF0F5" opacity="0.45"/>
  <circle cx="56" cy="46" r="1"   fill="#DDF0F5" opacity="0.5"/>
  <circle cx="7"  cy="51" r="0.7" fill="#DDF0F5" opacity="0.4"/>
  <circle cx="47" cy="56" r="0.7" fill="#DDF0F5" opacity="0.35"/>
  <circle cx="19" cy="55" r="0.5" fill="#DDF0F5" opacity="0.35"/>

  <!-- Engine glows (behind ship) -->
  <ellipse cx="32" cy="51" rx="7"   ry="5"   fill="#00D8F0" opacity="0.35"/>
  <ellipse cx="32" cy="54" rx="4"   ry="6"   fill="#00D8F0" opacity="0.12"/>
  <ellipse cx="14" cy="45" rx="3"   ry="4"   fill="#00D8F0" opacity="0.28"/>
  <ellipse cx="50" cy="45" rx="3"   ry="4"   fill="#00D8F0" opacity="0.28"/>

  <!-- Left wing -->
  <path d="M27 30 L10 46 L19 41 L27 35 Z"
        fill="#0C2232" stroke="#00D8F0" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Right wing -->
  <path d="M37 30 L54 46 L45 41 L37 35 Z"
        fill="#0C2232" stroke="#00D8F0" stroke-width="1.3" stroke-linejoin="round"/>

  <!-- Main fuselage -->
  <path d="M32 8 L39 24 L39 48 L32 52 L25 48 L25 24 Z"
        fill="#0C2232" stroke="#00D8F0" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Nose accent -->
  <path d="M32 8 L38 23 L32 19 L26 23 Z" fill="#00D8F0" opacity="0.9"/>

  <!-- Cockpit -->
  <ellipse cx="32" cy="23" rx="3"   ry="4"   fill="#00D8F0" opacity="0.18"/>
  <ellipse cx="32" cy="23" rx="1.8" ry="2.5" fill="#DDF0F5" opacity="0.45"/>

  <!-- Keel line -->
  <line x1="32" y1="28" x2="32" y2="49"
        stroke="#00D8F0" stroke-width="0.8" opacity="0.4"/>
</svg>
